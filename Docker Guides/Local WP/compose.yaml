services:
  wordpress:
    image: wordpress:php8.2-apache
    platform: linux/amd64
    restart: always
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: test_exampleuser
      WORDPRESS_DB_PASSWORD: test_examplepass
      WORDPRESS_DB_NAME: testexampledata
    volumes:
      - wp_html:/var/www/html
      - ./wp-content:/var/www/html/wp-content
    depends_on:
      - db

  db:
    image: mysql:8.0
    platform: linux/amd64
    restart: always
    environment:
      MYSQL_DATABASE: testexampledata
      MYSQL_USER: test_exampleuser
      MYSQL_PASSWORD: test_examplepass
      MYSQL_ROOT_PASSWORD: rootexamplepass
    volumes:
      - db:/var/lib/mysql
      - ./backups:/backups

  wpcli:
    image: wordpress:cli-php8.2
    platform: linux/amd64
    user: "33:33"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: testexampledata
      WORDPRESS_DB_USER: test_exampleuser
      WORDPRESS_DB_PASSWORD: test_examplepass
    volumes:
      - wp_html:/var/www/html
      - ./wp-content:/var/www/html/wp-content
      - ./backups:/backups
    depends_on:
      - db
      - wordpress
    entrypoint: ["wp"]

  phpmyadmin:
    image: phpmyadmin:latest
    platform: linux/amd64
    restart: always
    ports:
      - "8082:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db

volumes:
  wp_html:
  db: